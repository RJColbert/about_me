<!DOCTYPE html>
<html lang="en">
<head>
	<link rel="stylesheet" href="about.css"/>
	<title>About Renee</title>
	<script src="js/content.js" charset="utf-8" defer></script>
	<script src="js/about.js" charset="utf-8" defer></script>
</head>

<body>
	<div class="logo"></div>
	<div class="content">
		<div class="main">
			<div class="main_title">
				<div class="main_title_w" data-text="pass"></div>
				<div class="main_title_b" data-text="main_title_pass"></div>
			</div>
			<div class="main_title">
				<div class="main_title_w" data-text="purp"></div>
				<div class="main_title_b" data-text="main_title_purp"></div>
			</div>		
			<div class="main_body" data-text="main_body">
			</div>
			<div class="directions">
				<div class="direction" data-text="direction_1"></div>
				<div class="plus"></div>
				<div class="direction" data-text="direction_2"></div>
			</div>
		</div>

		<div class="ob_wrap">
			<div class="openbox">
				<div class="ob_inner">
					<div class="ob_title"></div>
					<div class="ob_body"></div>
					<div class="ob_scripts">
						<div class="ob_script">
							<div class="ob_script_w" data-text="pass"></div>
							<div class="ob_script_b ob_pass"></div>
						</div>
						<div class="ob_script">
							<div class="ob_script_w" data-text="purp"></div>
							<div class="ob_script_b ob_purp"></div>
						</div>	
					</div>
				</div>
			</div>
			<div class="ob_pagination">
				<div class="ob_arrow ob_prev"></div>
				<div class="ob_dots">
					<div class="ob_dot" data-dot="1"></div>
					<div class="ob_dot" data-dot="2"></div>
					<div class="ob_dot" data-dot="3"></div>
					<div class="ob_dot" data-dot="4"></div>
					<div class="ob_dot" data-dot="5"></div>
					<div class="ob_dot" data-dot="6"></div>
				</div>
				<div class="ob_arrow ob_next"></div>
			</div>
		</div>

		<div class="snow_layer"></div>
		
		<div class="image_container">
			<div class="hs_point hs1"></div>
			<div class="hs_point hs2"></div>
			<div class="hs_point hs3 flip"></div>
			<div class="hs_point hs4"></div>
			<div class="hs_point hs5"></div>
			<div class="hs_point hs6 flip"></div>

			<div class="img hs1"></div>
			<div class="img hs2"></div>
			<div class="img hs3"></div>
			<div class="img hs4"></div>
			<div class="img hs5"></div>
			<div class="img hs6"></div>
			<div class="img bg"></div>
		</div>
	</div>

	<!-- svg -->
	<template id="hotspot">
		<div class="hs">
		    <svg xmlns="http://www.w3.org/2000/svg" viewbox="0 0 54 50.443" xmlns:xlink="http://www.w3.org/1999/xlink" overflow="visible" fill="none">
	    		<path class="tail" d="M 39.41 31.91 L 54 50.443 L 33.169 38.651 C 30.184 40.609 40.9 29.201 39.41 31.91 Z" fill="#FF7761">	
	    		</path>
	    		<g class="circle">
	    			<defs>
	    				<path d="M 22.999 0 C 10.297 0 0 10.297 0 22.999 C 0 35.701 10.297 46 22.999 46 C 35.702 46 46 35.702 46 22.999 C 46 10.297 35.702 0 22.999 0 Z" id="a1198z">		
	    				</path>
	    				<clipPath id="a1199z">
	    					<use xlink:href="#a1198z">
	    					</use>
	    				</clipPath>
	    			</defs>
	    			<use xlink:href="#a1198z" fill="rgb(8, 19, 25)" clip-path="url(#a1199z)" stroke-width="4" stroke="#FF7761">
	    			</use>
		    		<g class="hs_plus" transform="translate(13.714 13.454)">
		    			<path d="M 9.253 0 L 9.142 18.285" fill="rgb(255, 255, 255)" stroke-width="2" stroke="rgb(255, 255, 255)" stroke-linecap="round">
		    			</path>
		    			<path d="M 0 9.142 L 18.285 9.142" fill="transparent" stroke-width="2" stroke="rgb(255, 255, 255)" stroke-linecap="round">
		    			</path>
		    		</g>
		    	</g>
		    </svg>
		</div>
	</template>

</body>

</html>
